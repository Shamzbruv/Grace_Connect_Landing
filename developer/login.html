<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Login - Grace Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page-form developer-auth-page">
    <main class="page-content developer-auth-shell">
        <div class="developer-login-panel">
            <a href="../index.html" class="developer-login-brand">
                <img src="../assets/logo.png" alt="Grace Connect" onerror="this.style.display='none'">
                <span>Grace Connect</span>
            </a>
            <div class="form-header">
                <h1>Platform Team Login</h1>
                <p>Authorized Grace Connect developer access only.</p>
            </div>

            <form id="developerLoginForm" class="styled-form">
                <div class="input-group">
                    <label for="developerEmail">Email Address</label>
                    <input type="email" id="developerEmail" autocomplete="email" required>
                </div>
                <div class="input-group">
                    <label for="developerPassword">Password</label>
                    <input type="password" id="developerPassword" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large w-full" id="developerLoginBtn">
                    Sign In
                </button>
                <div id="developerLoginMessage" class="message" style="display: none;"></div>
            </form>
        </div>
    </main>

    <script src="../js/supabase-config.js?v=20260624-7"></script>
    <script src="../js/developer-portal.js?v=20260624-7"></script>
</body>
</html>
